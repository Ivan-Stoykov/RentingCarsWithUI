<div class="add-car-container">
  <h2>Добавяне на нов автомобил</h2>

  <form [formGroup]="editCar" class="add-car-form" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label>Марка</label>
      <input type="text" formControlName="marka" />
    </div>

    <div class="form-group">
      <label>Модел</label>
      <input type="text" formControlName="model" />
    </div>

    <div class="form-group">
      <label>Снимка</label>
      <input type="text" formControlName="img_url" />
    </div>

    <div class="form-group">
      <label>Година</label>
      <input type="number" formControlName="godina" />
    </div>
    
    <div class="form-group">
      <label>Вид</label>
      <input type="text" formControlName="vid" />
    </div>

    <div class="form-group">
      <label>Цвят</label>
      <input type="text" formControlName="cvqt" />
    </div>

    <div class="form-group">
      <label>Цена за ден (лв.)</label>
      <input type="number" formControlName="cenaZaDen" />
    </div>

    <div class="form-group">
      <label>Изминати километри</label>
      <input type="number" formControlName="izminatiKilometri"/>
    </div>

    <div class="form-group full-width">
      <label>Екстри</label>
      <textarea
        formControlName="ekstri"
      ></textarea>
    </div>

    <div class="submit-btn-wrapper">
      <button type="submit" class="btn-submit">Запази автомобила</button>
    </div>
  </form>
</div>
