<div class="add-car-container">
  <h2>Редактиране на потребител</h2>

  <form [formGroup]="editUser" class="add-car-form" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label>Име</label>
      <input type="text" formControlName="ime"/>
    </div>

    <div class="form-group">
      <label>Телефон</label>
      <input type="tel" formControlName="telefon" />
    </div>

    <div class="form-group">
      <label>Имейл</label>
      <input type="email" formControlName="email"/>
    </div>

    <div class="form-group">
      <label>Роля</label>
      <input type="text" formControlName="rolq" />
    </div>
    
    <div class="form-group full-width">
      <label>Улица</label>
      <input type="text" formControlName="ulica" />
    </div>

    <div class="form-group">
      <label>Град</label>
      <input type="text" formControlName="grad" />
    </div>

    <div class="form-group">
      <label>Държава</label>
      <input type="text" formControlName="durjava" />
    </div>

    <div class="submit-btn-wrapper">
      <button type="submit" class="btn-submit">Запази автомобила</button>
    </div>
  </form>
</div>
