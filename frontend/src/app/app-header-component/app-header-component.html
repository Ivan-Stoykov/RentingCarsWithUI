<header class="header">
  <div class="header-left">
    <div class="logo">
      <a>KoliPodNaem.com</a>
    </div>

    <nav class="navbar">
      <ul class="nav-links">
        <li><a routerLink="/">Home</a></li>
        <li><a routerLink="/cars">Cars</a></li>
      </ul>
    </nav>
  </div>

  <div class="header-right">
    @if(user().klient_ID != 0) {
      @if(user().rolq === "admin"){
        <a routerLink="/admin" class="btn login-btn">Dashboard</a>
      }
      <a [routerLink]="`/user`" class="btn login-btn">{{user().ime + " - " + user().email}}</a>
      <a class="btn register-btn"><button (click)="LogOut()">Logout</button></a>
    } @else {
      <a routerLink="/login" class="btn login-btn">Log In</a>
      <a routerLink="/register" class="btn register-btn">Register</a>
    }
  </div>
</header>
<main><ng-content /></main>
